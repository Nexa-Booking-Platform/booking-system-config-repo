server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://user-db:5432/user
#    username: user_prod
#    password: user_prod_pass
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  mail:
    host: smtp.gmail.com
    port: 587
#    username: prod_email@gmail.com
#    password: prod_email_password
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true